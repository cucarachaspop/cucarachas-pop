<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivina el Artista - Cucarachas Pop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown-dark: #2C1A12;
      --brown-deep: #3E2723;
      --brown-mid: #5D4037;
      --brown-light: #8D6E63;
      --cream: #EFEBE9;
      --gold: #FFD54F;
      --pink: #F48FB1;
      --glass-bg: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.12);
      --green: #66BB6A;
      --red: #EF5350;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Nunito',sans-serif;
      background: linear-gradient(160deg, #2C1A12, #3E2723 40%, #4E342E 70%, #2C1A12);
      color:var(--cream);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:16px;
    }

    .back-link {
      align-self: flex-start;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      margin-bottom: 6px;
    }
    .back-link:hover { background: rgba(255,255,255,0.06); color: var(--cream); }

    h1 {
      font-family:'Fredoka One',cursive;
      font-size:1.5rem;
      background:linear-gradient(135deg,var(--gold),var(--pink));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin:4px 0 4px;
    }

    .subtitle { font-size:0.85rem; color:rgba(255,255,255,0.4); margin-bottom:16px; }

    .progress-bar-container {
      width:100%; max-width:500px; height:6px;
      background:rgba(255,255,255,0.06);
      border-radius:10px; overflow:hidden; margin-bottom:16px;
    }
    .progress-bar-fill {
      height:100%;
      background:linear-gradient(90deg,var(--gold),var(--pink));
      border-radius:10px;
      transition:width 0.5s ease;
      width:0%;
    }

    .info-bar {
      display:flex; gap:10px; margin-bottom:18px;
      flex-wrap:wrap; justify-content:center;
    }
    .score-badge {
      background:var(--glass-bg);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid var(--glass-border);
      border-radius:50px;
      padding:7px 16px;
      font-weight:700;
      font-size:0.82rem;
    }

    .quiz-card {
      background:var(--glass-bg);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:30px 24px;
      max-width:500px;
      width:100%;
      text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
      animation:scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)} }

    .question-number {
      font-size:0.75rem;
      color:rgba(255,255,255,0.3);
      margin-bottom:8px;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .emoji-display {
      font-size:5rem;
      margin:14px 0;
      animation:bounceEmoji 2.5s ease-in-out infinite;
      line-height:1.2;
    }
    @keyframes bounceEmoji {
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-6px) scale(1.04)}
    }

    .hint-text {
      font-size:0.85rem;
      color:var(--gold);
      margin-bottom:22px;
      font-style:italic;
      opacity:0;
      transition:opacity 0.3s;
    }
    .hint-text.show { opacity:1; }

    .options-container { display:flex; flex-direction:column; gap:10px; }

    .option-btn {
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(255,255,255,0.1);
      border-radius:16px;
      padding:15px 20px 15px 52px;
      color:var(--cream);
      font-family:'Nunito',sans-serif;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
      transition:all 0.3s ease;
      position:relative;
      text-align:left;
    }
    .option-btn:hover {
      background:rgba(255,255,255,0.1);
      border-color:rgba(255,255,255,0.2);
      transform:translateX(3px);
    }
    .option-btn:active { transform:scale(0.98); }
    .option-btn.correct {
      background:rgba(102,187,106,0.2);
      border-color:var(--green);
      color:var(--green);
      animation:pulse 0.5s ease;
    }
    .option-btn.wrong {
      background:rgba(239,83,80,0.2);
      border-color:var(--red);
      color:var(--red);
      animation:shake 0.4s ease;
    }
    @keyframes pulse { 0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)} }

    .option-label {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      width:26px;height:26px; border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      font-size:0.72rem; font-weight:800;
    }

    .feedback {
      margin-top:16px; padding:12px; border-radius:12px;
      font-weight:700; font-size:0.92rem; display:none;
    }
    .feedback.correct-fb {
      display:block;
      background:rgba(102,187,106,0.12);
      border:1px solid rgba(102,187,106,0.25);
      color:var(--green);
    }
    .feedback.wrong-fb {
      display:block;
      background:rgba(239,83,80,0.12);
      border:1px solid rgba(239,83,80,0.25);
      color:var(--red);
    }

    .btn-next {
      display:none; margin-top:18px;
      padding:13px 30px; border:none; border-radius:50px;
      background:linear-gradient(135deg,var(--gold),#FFC107);
      color:var(--brown-dark); font-family:'Nunito',sans-serif;
      font-weight:800; font-size:0.95rem; cursor:pointer;
      transition:all 0.3s ease;
    }
    .btn-next.show { display:inline-block; }
    .btn-next:hover { transform:translateY(-2px) scale(1.03); }

    .hint-btn {
      background:none; border:1px dashed rgba(255,213,79,0.3);
      color:var(--gold); padding:6px 16px; border-radius:20px;
      font-family:'Nunito',sans-serif; font-size:0.8rem;
      cursor:pointer; margin-bottom:12px; transition:all 0.3s;
    }
    .hint-btn:hover { background:rgba(255,213,79,0.08); }

    .results-card {
      background:var(--glass-bg);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:36px 28px;
      max-width:500px; width:100%;
      text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
      animation:scaleIn 0.6s ease-out;
      display:none;
    }
    .results-card.show { display:block; }
    .results-emoji { font-size:3.5rem; margin-bottom:14px; }
    .results-title {
      font-family:'Fredoka One',cursive; font-size:1.6rem;
      background:linear-gradient(135deg,var(--gold),var(--pink));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:8px;
    }
    .results-score { font-size:2.8rem; font-weight:800; color:var(--gold); margin:10px 0; }
    .results-msg { color:rgba(255,255,255,0.5); margin-bottom:22px; font-size:0.92rem; }

    .btn {
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 28px;border:none;border-radius:50px;
      font-family:'Nunito',sans-serif;font-weight:700;font-size:0.95rem;
      cursor:pointer;transition:all 0.3s ease;text-decoration:none;
    }
    .btn-gold {
      background:linear-gradient(135deg,var(--gold),#FFC107);
      color:var(--brown-dark);
      box-shadow:0 4px 15px rgba(255,213,79,0.3);
    }
    .btn-gold:hover { transform:translateY(-2px) scale(1.03); }
    .btn-light {
      background:rgba(255,255,255,0.08);color:var(--cream);
      border:1px solid rgba(255,255,255,0.12);
      margin-top:10px;font-size:0.85rem;padding:8px 18px;
    }

    @media(max-width:480px){
      .emoji-display{font-size:3.5rem;}
      h1{font-size:1.3rem;}
      .quiz-card{padding:22px 16px;}
      .option-btn{padding:13px 16px 13px 46px;font-size:0.9rem;}
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← Volver</a>
  <h1>🎤 Adivina el Artista</h1>
  <p class="subtitle">¿Puedes adivinar con solo un emoji?</p>

  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <div class="info-bar">
    <div class="score-badge">✅ <span id="correctCount">0</span></div>
    <div class="score-badge">❌ <span id="wrongCount">0</span></div>
    <div class="score-badge">📊 <span id="currentQ">1</span>/10</div>
  </div>

  <div class="quiz-card" id="quizCard">
    <div class="question-number" id="questionNumber">PREGUNTA 1 DE 10</div>
    <div class="emoji-display" id="emojiDisplay">☕</div>
    <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 Ver pista</button>
    <div class="hint-text" id="hintText"></div>
    <div class="options-container" id="optionsContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-emoji" id="resultsEmoji">🏆</div>
    <div class="results-title">¡Resultados!</div>
    <div class="results-score" id="resultsScore">0/10</div>
    <div class="results-msg" id="resultsMsg"></div>
    <button class="btn btn-gold" onclick="initGame()">🔄 Jugar de Nuevo</button><br>
    <a href="index.html" class="btn btn-light">← Volver al inicio</a>
  </div>

  <script>
    // ===== ARTIST BANK (same as Apps Script) =====
    var ALL_ARTISTS = [
      { emoji:'☕', opciones:['Katy Perry','Kesha','Sabrina Carpenter'], respuesta:2, pista:'La scort con 1989 debuts...' },
      { emoji:'🍚', opciones:['Beyoncé','Lady Gaga','Nicki Minaj'], respuesta:2, pista:'Vuelos falsos...' },
      { emoji:'🌧️', opciones:['Rihanna','Shakira','Adele'], respuesta:0, pista:'La que canta la de cierta herramienta para la lluvia...' },
      { emoji:'🍖', opciones:['Lady Gaga','Madonna','Britney'], respuesta:0, pista:'Meat Dress...' },
      { emoji:'🐫', opciones:['Dua Lipa','Taylor Swift','Billie Eilish'], respuesta:1, pista:'Lomo saltado...' },
      { emoji:'🎄', opciones:['Mariah Carey','Shakira','Ariana Grande'], respuesta:0, pista:'One hit wonder...' },
      { emoji:'🤦🏿', opciones:['Cardi B','Rihanna','Megan Thee Stallion'], respuesta:1, pista:'Frente de globo aerostático...' },
      { emoji:'🚘', opciones:['Olivia Rodrigo','Doja Cat','Ice Spice'], respuesta:0, pista:'Plagiadora...' },
      { emoji:'🧔🏾‍♂️', opciones:['Rosalía','Becky G','Karol G'], respuesta:2, pista:'Macho...' },
      { emoji:'💵', opciones:['Shakira','Karol G','Bad Bunny'], respuesta:0, pista:'Impuestos...' },
      { emoji:'🎪', opciones:['Katy Perry','Pink','Britney Spears'], respuesta:2, pista:'Circus era y al manicomio...' },
      { emoji:'👩‍👧‍👦', opciones:['Dua Lipa','SZA','Billie Eilish'], respuesta:2, pista:'In cest o...' },
      { emoji:'🧄', opciones:['Beyoncé','Ariana Grande','Mariah Carey'], respuesta:0, pista:'Aliento a ajo...' },
      { emoji:'🐗', opciones:['Lizzo','Beyoncé','Cardi B'], respuesta:0, pista:'Jabali tripudo...' },
      { emoji:'🍍', opciones:['Doja Cat','Katy Perry','Dua Lipa'], respuesta:1, pista:'Flopera amarillenta...' },
      { emoji:'💣', opciones:['Ariana Grande','Lorde','Zorraliné'], respuesta:0, pista:'Explosiones...' },
      { emoji:'🛳️', opciones:['Lady Gaga','Miley Cyrus','Zorraliné'], respuesta:2, pista:'Manca horrenda...' },
      { emoji:'🥒', opciones:['Lizzo','Melanie Martinez','Lorde'], respuesta:1, pista:'Lo introdujo en su mejor amiga...' },
      { emoji:'🕎', opciones:['Lana del Rey','Rihanna','Sia'], respuesta:2, pista:'La esclava de mafionce...' }
    ];

    function getArtistBank() {
      var copy = ALL_ARTISTS.slice();
      for (var i = copy.length-1; i > 0; i--) {
        var j = Math.floor(Math.random()*(i+1));
        var tmp = copy[i]; copy[i] = copy[j]; copy[j] = tmp;
      }
      return copy.slice(0, 10);
    }

    var questions=[], currentIndex=0, correctCount=0, wrongCount=0, answered=false;

    function initGame() {
      currentIndex=0; correctCount=0; wrongCount=0; answered=false;
      document.getElementById('quizCard').style.display='';
      document.getElementById('resultsCard').classList.remove('show');
      questions = getArtistBank();
      updateUI();
    }

    function updateUI() {
      if (currentIndex >= questions.length) { showResults(); return; }
      var q = questions[currentIndex];
      answered = false;
      document.getElementById('questionNumber').textContent = 'PREGUNTA '+(currentIndex+1)+' DE '+questions.length;
      document.getElementById('emojiDisplay').textContent = q.emoji;
      document.getElementById('currentQ').textContent = currentIndex+1;
      document.getElementById('correctCount').textContent = correctCount;
      document.getElementById('wrongCount').textContent = wrongCount;
      document.getElementById('progressBar').style.width = ((currentIndex/questions.length)*100)+'%';
      document.getElementById('hintText').classList.remove('show');
      document.getElementById('hintText').textContent = '💡 '+q.pista;
      document.getElementById('hintBtn').style.display = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').style.display = 'none';
      document.getElementById('nextBtn').classList.remove('show');

      var container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      var labels = ['A','B','C'];
      q.opciones.forEach(function(opt, idx) {
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = '<span class="option-label">'+labels[idx]+'</span>'+opt;
        btn.onclick = function(){ selectAnswer(idx); };
        container.appendChild(btn);
      });

      var card = document.getElementById('quizCard');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'scaleIn 0.5s ease-out';
    }

    function showHint() {
      document.getElementById('hintText').classList.add('show');
      document.getElementById('hintBtn').style.display = 'none';
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;
      var q = questions[currentIndex];
      var btns = document.querySelectorAll('.option-btn');
      var feedback = document.getElementById('feedback');

      if (idx === q.respuesta) {
        btns[idx].classList.add('correct');
        correctCount++;
        feedback.className = 'feedback correct-fb';
        feedback.textContent = '🎉 ¡Correcto! Era '+q.opciones[q.respuesta];
      } else {
        btns[idx].classList.add('wrong');
        btns[q.respuesta].classList.add('correct');
        wrongCount++;
        feedback.className = 'feedback wrong-fb';
        feedback.textContent = '😅 Incorrecto. Era '+q.opciones[q.respuesta];
      }
      feedback.style.display = 'block';
      document.getElementById('correctCount').textContent = correctCount;
      document.getElementById('wrongCount').textContent = wrongCount;
      btns.forEach(function(b){ b.style.pointerEvents='none'; });
      document.getElementById('nextBtn').classList.add('show');
    }

    function nextQuestion() { currentIndex++; updateUI(); }

    function showResults() {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('progressBar').style.width = '100%';
      var pct = Math.round((correctCount/questions.length)*100);
      document.getElementById('resultsScore').textContent = correctCount+'/'+questions.length;
      var emoji, msg;
      if (pct===100) { emoji='👑🪳🏆'; msg='¡Cucaracha pop SUPREMA! Nivel enciclopedia.'; }
      else if (pct>=70) { emoji='🎉🪳✨'; msg='¡Muy bien! Casi una cucaracha experta.'; }
      else if (pct>=40) { emoji='🤔🪳🎵'; msg='No está mal, pero falta escuchar más pop.'; }
      else { emoji='😅🪳💀'; msg='¡Oops! Hora de ponerse al día, cucarachita.'; }
      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsMsg').textContent = msg;
      document.getElementById('resultsCard').classList.add('show');
    }

    initGame();
  </script>
</body>
</html>
